    let currentUser = null;
    let editId = null;
    let uploadedImg = '';
    let searchQuery = '';
    let selectedCategory = 'All';

    // Route Kontrolü
    function route() {
        const hash = window.location.hash;
        if (hash === '#/admin') {
            if (currentUser) renderAdminPanel();
            else renderAdminLogin();
        } else if (hash.startsWith('#/ilan/')) {
            const id = parseInt(hash.split('/')[2]);
            renderDetail(id);
        } else {
            renderHome();
        }
    }

    // Arama ve Filtreleme
    function handleSearch(val) {
        searchQuery = val;
        renderListings();
    }

    function setCategory(cat) {
        if (selectedCategory === cat) selectedCategory = 'All';
        else selectedCategory = cat;
        renderCategories(); 
        renderListings();   
        document.getElementById('ilanlar-bolumu').scrollIntoView({behavior: 'smooth', block: 'start'});
    }

    function renderCategories() {
        const container = document.getElementById('category-container');
        if(!container) return;

        const cats = [
            {icon: 'fa-car-side', label: 'Araç', val: 'Araç', color: 'text-blue-600', bg: 'bg-blue-50', activeBg: 'bg-blue-600', activeText: 'text-white'}, 
            {icon: 'fa-house-chimney', label: 'Emlak', val: 'Ev / Arsa', color: 'text-emerald-600', bg: 'bg-emerald-50', activeBg: 'bg-emerald-600', activeText: 'text-white'}, 
            {icon: 'fa-key', label: 'Kiralık', val: 'Kiralık', color: 'text-purple-600', bg: 'bg-purple-50', activeBg: 'bg-purple-600', activeText: 'text-white'}
        ];

        container.innerHTML = cats.map(c => {
            let isActive = selectedCategory === c.val;
            let activeClasses = isActive ? `${c.activeBg} ${c.activeText} scale-110 shadow-lg` : `${c.bg} ${c.color} hover:-translate-y-2 hover:shadow-md`;
            let textClasses = isActive ? 'text-portal-red' : 'text-portal-navy group-hover:text-portal-red';
            return `
                <button onclick="setCategory('${c.val}')" class="flex flex-col items-center gap-3 sm:gap-4 group cursor-pointer transition-transform">
                    <div class="w-14 h-14 sm:w-20 sm:h-20 rounded-2xl flex items-center justify-center text-2xl sm:text-3xl shadow-sm border border-black/5 transition-all duration-300 ${activeClasses}">
                        <i class="fa-solid ${c.icon}"></i>
                    </div>
                    <span class="text-xs sm:text-[15px] font-bold transition-colors ${textClasses}">${c.label}</span>
                </button>
            `;
        }).join('');
    }

    // Ana Sayfa İlan Kartları Çizimi
    function renderListings() {
        const container = document.getElementById('listings-container');
        const titleEl = document.getElementById('listings-title');
        const countSpan = document.getElementById('listings-count');
        if(!container) return;

        let filtered = vehicles.filter(v => {
            let matchCat = selectedCategory === 'All' || v.category === selectedCategory;
            let query = searchQuery.toLowerCase();
            let matchSearch = (v.name && v.name.toLowerCase().includes(query)) || 
                              (v.location && v.location.toLowerCase().includes(query));
            return matchCat && matchSearch;
        }).sort((a,b) => (b.isVIP ? 1 : 0) - (a.isVIP ? 1 : 0));

        if(titleEl) titleEl.innerText = (selectedCategory === 'All' && !searchQuery) ? 'VİTRİN İLANLARI' : 'ARAMA SONUÇLARI';
        if(countSpan) countSpan.innerText = filtered.length + ' İlan';

        if (filtered.length > 0) {
            container.innerHTML = filtered.map(v => `
                <div class="group bg-white rounded-[25px] overflow-hidden shadow-soft border border-gray-100 transition-all duration-300 cursor-pointer flex flex-row sm:flex-col mb-3 sm:mb-0 transform hover:-translate-y-1" onclick="window.location.hash = '#/ilan/${v.id}'">
                    <div class="w-[130px] h-[120px] sm:w-full sm:h-[200px] shrink-0 relative bg-gray-100 overflow-hidden">
                        <img src="${v.image}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"/>
                        ${v.isVIP ? `<div class="absolute top-2.5 left-2.5 bg-portal-red text-white text-[10px] font-bold px-2.5 py-1 rounded-md uppercase tracking-wider shadow-lg">VIP İLAN</div>` : ''}
                    </div>
                    <div class="p-4 sm:p-5 flex flex-col flex-1 min-w-0 bg-white relative z-10">
                        <div class="flex items-center justify-between mb-1.5">
                            <span class="text-portal-red font-bold text-[11px] uppercase tracking-wider">${v.category}</span>
                        </div>
                        <h3 class="font-bold text-sm sm:text-base text-portal-navy line-clamp-2 leading-snug mb-3 group-hover:text-portal-red transition-colors">${v.name}</h3>
                        <div class="mt-auto border-t border-gray-100 pt-3">
                            <div class="flex items-center text-gray-500 text-[12px] mb-1.5 font-medium truncate">
                                <i class="fa-solid fa-location-dot mr-1.5"></i>
                                <span class="truncate">${v.location}</span>
                            </div>
                            <div class="font-black text-portal-red text-lg sm:text-xl tracking-tight">${v.price ? v.price + ' TL' : 'Fiyat Sorun'}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        } else {
            container.innerHTML = `
                <div class="col-span-full py-20 flex flex-col items-center justify-center bg-white rounded-[25px] border border-dashed border-gray-300">
                    <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mb-4">
                        <i class="fa-solid fa-box-open text-4xl text-gray-400"></i>
                    </div>
                    <span class="text-portal-navy font-bold text-lg mb-1">İlan Bulunamadı</span>
                    <button onclick="clearFilters()" class="mt-4 text-portal-red font-bold text-sm hover:underline">Filtreleri Temizle</button>
                </div>
            `;
        }
    }

                                        <i class="fa-solid fa-user"></i>

    // --- ADMİN GİRİŞİ ÇİZİMİ ---
    function renderAdminLogin() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="min-h-screen flex items-center justify-center p-4 bg-portal-bg">
                <div class="w-full max-w-sm bg-white rounded-[25px] p-8 shadow-soft border border-gray-100">
                    <h2 class="text-2xl font-black font-montserrat text-center text-portal-navy mb-4">Yönetici Girişi</h2>
                    <div class="bg-yellow-50 border border-yellow-200 text-xs text-center text-yellow-800 p-2 rounded-lg mb-6">
                        Demo: <b>admin@admin.com</b> / <b>123456</b>
                    </div>
                    <div id="loginError" class="bg-red-50 text-portal-red p-3 rounded-xl text-sm font-medium text-center mb-6 hidden"></div>
                    <form onsubmit="handleLogin(event)" class="space-y-4">
                        <div>
                            <input type="email" id="loginEmail" required class="w-full bg-gray-50 border border-gray-200 rounded-[15px] px-4 py-3.5 text-sm focus:border-portal-navy focus:ring-0" placeholder="admin@admin.com"/>
                        </div>
                        <div>
                            <input type="password" id="loginPassword" required class="w-full bg-gray-50 border border-gray-200 rounded-[15px] px-4 py-3.5 text-sm focus:border-portal-navy focus:ring-0" placeholder="Şifre"/>
                        </div>
                        <button type="submit" class="w-full bg-portal-navy text-white font-bold py-3.5 rounded-[15px] text-sm hover:bg-gray-800 transition-colors shadow-lg">Giriş Yap</button>
                    </form>
                </div>
            </div>
        `;
    }

    // --- ADMİN PANELİ ÇİZİMİ ---
    function renderAdminPanel() {
        const app = document.getElementById('app');
        
        let listHtml = '';
        const sortedVehicles = [...vehicles].sort((a,b) => (b.isVIP ? 1 : 0) - (a.isVIP ? 1 : 0));
        
        if (sortedVehicles.length > 0) {
            listHtml = sortedVehicles.map(v => `
                <div class="flex flex-col sm:flex-row gap-4 bg-white p-3.5 rounded-[20px] border border-gray-100 items-center hover:shadow-md transition-shadow">
                    <img src="${v.image}" class="w-full sm:w-24 h-32 sm:h-20 object-cover rounded-[15px] shrink-0 bg-gray-100"/>
                    <div class="flex-1 min-w-0 text-center sm:text-left">
                        <div class="flex items-center justify-center sm:justify-start gap-2 mb-1">
                            ${v.isVIP ? `<span class="bg-portal-red text-white text-[9px] font-bold px-1.5 py-0.5 rounded">VIP</span>` : ''}
                            <span class="text-xs font-bold text-gray-500">${v.category}</span>
                        </div>
                        <div class="font-bold text-sm text-portal-navy truncate mb-1">${v.name}</div>
                        <div class="text-sm font-black text-portal-red">${v.price} TL</div>
                    </div>
                    <div class="flex w-full sm:w-auto gap-2 mt-2 sm:mt-0">
                        <button onclick="editVehicle(${v.id})" class="flex-1 sm:flex-none text-portal-navy bg-gray-50 border border-gray-200 px-4 py-2.5 rounded-[12px] text-xs font-bold hover:bg-gray-100 transition-colors">Düzenle</button>
                        <button onclick="deleteVehicle(${v.id})" class="flex-1 sm:flex-none text-portal-red bg-red-50 border border-red-100 px-4 py-2.5 rounded-[12px] text-xs font-bold hover:bg-red-100 transition-colors">Sil</button>
                    </div>
                </div>
            `).join('');
        } else {
            listHtml = `<div class="text-center py-10"><i class="fa-regular fa-folder-open text-3xl text-gray-300 mb-2"></i><p class="text-sm font-medium text-gray-500">Kayıtlı ilan yok.</p></div>`;
        }

        app.innerHTML = `
            <div class="min-h-screen flex flex-col bg-portal-bg pb-10">
                <header class="bg-white border-b border-gray-200 py-4 px-4 sm:px-6 flex justify-between items-center sticky top-0 z-50 shadow-sm">
                    <h1 class="text-lg sm:text-xl font-black font-montserrat text-portal-navy">Admin Paneli</h1>
                    <button onclick="handleLogout()" class="bg-red-50 text-portal-red text-xs sm:text-sm font-bold px-4 py-2 rounded-lg hover:bg-red-100 transition-colors">Çıkış</button>
                </header>
                <div class="flex-1 max-w-7xl w-full mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6 mt-4">
                    <div class="lg:col-span-1 space-y-6">
                        <div class="bg-white rounded-[25px] p-6 shadow-soft border border-gray-100">
                            <h3 class="font-black text-lg text-portal-navy mb-5 border-b border-gray-100 pb-3">${editId ? 'İlanı Düzenle' : 'Yeni İlan Ekle'}</h3>
                            <form onsubmit="saveVehicle(event)" class="space-y-4">
                                <input type="text" id="vName" required class="w-full bg-gray-50 border border-gray-200 text-sm rounded-[15px] px-4 py-3" placeholder="İlan Başlığı"/>
                                <div class="grid grid-cols-2 gap-3">
                                    <select id="vCat" class="w-full bg-gray-50 border border-gray-200 text-sm rounded-[15px] px-3 py-3 font-medium text-portal-navy">
                                        <option value="Araç">Araç</option>
                                        <option value="Ev / Arsa">Ev / Arsa</option>
                                        <option value="Kiralık">Kiralık</option>
                                    </select>
                                    <input type="text" id="vPrice" class="w-full bg-gray-50 border border-gray-200 text-sm rounded-[15px] px-3 py-3" placeholder="Fiyat (TL)"/>
                                </div>
                                <input type="text" id="vLoc" class="w-full bg-gray-50 border border-gray-200 text-sm rounded-[15px] px-4 py-3" placeholder="Konum (Silopi, Merkez)"/>
                                <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-gray-300 rounded-[15px] cursor-pointer bg-gray-50 hover:border-portal-navy transition-colors overflow-hidden">
                                    ${uploadedImg ? `<img src="${uploadedImg}" class="w-full h-full object-cover"/>` : `<div class="text-center text-gray-400 font-bold text-sm"><i class="fa-solid fa-camera text-2xl mb-2"></i><br>Fotoğraf Ekle</div>`}
                                    <input type="file" accept="image/*" class="hidden" onchange="handleFile(this)"/>
                                </label>
                                <textarea id="vDesc" required rows="4" class="w-full bg-gray-50 border border-gray-200 text-sm rounded-[15px] px-4 py-3 resize-none" placeholder="Açıklama giriniz..."></textarea>
                                <label class="flex items-center gap-3 cursor-pointer bg-gray-50 p-4 rounded-[15px] border border-gray-200">
                                    <input type="checkbox" id="vVIP" class="rounded text-portal-red w-5 h-5"/>
                                    <div class="flex flex-col"><span class="text-sm font-bold text-portal-navy">VIP İlan</span></div>
                                </label>
                                <button type="submit" id="saveBtn" class="w-full bg-portal-navy text-white text-sm font-bold py-4 rounded-[15px] shadow-lg hover:bg-gray-800 transition-colors">KAYDET</button>
                            </form>
                        </div>
                    </div>
                    <div class="lg:col-span-2 space-y-6">
                        <div class="bg-white rounded-[25px] p-6 shadow-soft border border-gray-100">
                            <h3 class="font-black text-lg text-portal-navy mb-5 border-b border-gray-100 pb-3">Yayındaki İlanlar</h3>
                            <div class="space-y-3 max-h-[700px] overflow-y-auto pr-2 no-scrollbar">
                                ${listHtml}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;

        if(editId) {
            const v = vehicles.find(x => x.id === editId);
            setTimeout(() => {
                document.getElementById('vName').value = v.name;
                document.getElementById('vCat').value = v.category;
                document.getElementById('vPrice').value = v.price;
                document.getElementById('vLoc').value = v.location;
                document.getElementById('vDesc').value = v.description;
                document.getElementById('vVIP').checked = v.isVIP;
            }, 50);
        }
    }

    // --- UYGULAMA İŞLEVLERİ ---
    window.handleLogin = function(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;
        if (email === 'admin@admin.com' && pass === '123456') {
            currentUser = { email };
            window.location.hash = '#/admin';
        } else {
            const err = document.getElementById('loginError');
            err.innerText = 'Hatalı giriş! E-posta: admin@admin.com Şifre: 123456';
            err.style.display = 'block';
        }
    };

    window.handleLogout = function() {
        currentUser = null;
        window.location.hash = '';
    };

    window.handleFile = function(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onloadend = () => {
                uploadedImg = reader.result;
                renderAdminPanel(); 
            }
            reader.readAsDataURL(file);
        }
    };

    window.saveVehicle = function(e) {
        e.preventDefault();
        const name = document.getElementById('vName').value;
        const cat = document.getElementById('vCat').value;
        const price = document.getElementById('vPrice').value;
        const loc = document.getElementById('vLoc').value;
        const desc = document.getElementById('vDesc').value;
        const vip = document.getElementById('vVIP').checked;
        
        const btn = document.getElementById('saveBtn');
        btn.innerText = "KAYDEDİLİYOR...";
        btn.disabled = true;

        setTimeout(() => {
            let img = uploadedImg;
            if (editId) {
                const existing = vehicles.find(x => x.id === editId);
                if (!img) img = existing.image;
                vehicles = vehicles.map(v => v.id === editId ? {id: v.id, name, category: cat, price, location: loc, image: img, description: desc, isVIP: vip, date: existing.date, seller: existing.seller, sellerYear: existing.sellerYear} : v);
            } else {
                if (!img) { 
                    alert('Lütfen fotoğraf yükleyin!'); 
                    btn.innerText="KAYDET"; 
                    btn.disabled=false; 
                    return; 
                }
                let newId = Math.floor(1000 + Math.random() * 9000);
                vehicles.push({ id: newId, name, category: cat, price, location: loc, image: img, description: desc, isVIP: vip, date: 'Bugün', seller: 'Silopi Sahibinden', sellerYear: '2024' });
            }
            
            editId = null;
            uploadedImg = '';
            alert('İlan başarıyla kaydedildi!');
            renderAdminPanel();
        }, 300);
    };

    window.deleteVehicle = function(id) {
        if (confirm('Bu ilanı silmek istediğinize emin misiniz?')) {
            vehicles = vehicles.filter(v => v.id !== id);
            renderAdminPanel();
        }
    };

    window.editVehicle = function(id) {
        const v = vehicles.find(x => x.id === id);
        editId = v.id;
        uploadedImg = v.image;
        renderAdminPanel();
    };

    window.addEventListener('hashchange', route);
    window.onload = route;

</script>
</body>
</html>
