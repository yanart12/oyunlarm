<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <meta name="theme-color" content="#0A1931"/>
    <title>Silopi Sahibinden | Profesyonel İlan Platformu</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "portal-navy": "#0A1931",
                        "portal-red": "#E61C24",
                        "portal-bg": "#F5F7FA",
                        "portal-gray": "#64748B",
                        "portal-border": "#E2E8F0"
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif']
                    },
                    boxShadow: {
                        'premium': '0 10px 40px -10px rgba(10,25,49,0.1)',
                        'card-hover': '0 20px 40px -10px rgba(10,25,49,0.15)',
                        'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.1)'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F5F7FA; color: #0A1931; -webkit-tap-highlight-color: transparent; }
        .mobile-touch-active:active { transform: scale(0.98); opacity: 0.9; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .portal-hero {
            background-image: url('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            position: relative;
        }
        
        .portal-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(10,25,49,0.85) 0%, rgba(230,28,36,0.35) 100%);
            z-index: 0;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .glass-search {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: linear-gradient(90deg, #FFFFFF, #FFE5E5);
        }
    </style>
</head>
<body class="font-sans antialiased select-none md:select-text">

<script>
    window.onerror = function(message, source, lineno, colno, error) {
        document.getElementById('root').innerHTML = '<div style="padding:30px; color:#E61C24; font-family:sans-serif; text-align:center;"><h2>Sistem Hatası Yakalandı!</h2><p><b>Hata:</b> ' + message + '</p></div>';
    };
</script>

<div id="root">
    <div style="text-align:center; padding: 60px 20px; font-family: sans-serif; color: #0A1931;">
        <i class="fa-solid fa-spinner fa-spin" style="font-size: 40px; color: #E61C24; margin-bottom: 15px;"></i>
        <h2 style="font-weight: bold; margin-bottom: 5px;">Silopi Sahibinden Yükleniyor...</h2>
    </div>
</div>

<script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- YENİ TELEFON NUMARASI ---
    const WHATSAPP_NUMBER = "905443894007";

    // --- DEMO VERİLER ---
    const DEMO_VERILER = [
        {
            id: 1,
            name: "2020 Model Temiz Passat 1.5 TSI Business",
            category: "Araç",
            price: "1.450.000",
            location: "Silopi, Yenişehir Mah.",
            image: "https://images.unsplash.com/photo-1549399542-7e3f8b79c341?q=80&w=500&auto=format&fit=crop",
            description: "Hatasız, boyasız, tramersiz.",
            isVIP: true,
            date: "Bugün"
        },
        {
            id: 2,
            name: "Merkezde 3+1 Lüks Satılık Daire",
            category: "Ev / Arsa",
            price: "2.100.000",
            location: "Silopi, Ofis Mah.",
            image: "https://images.unsplash.com/photo-1564013799919-ab600027ffc6?q=80&w=500&auto=format&fit=crop",
            description: "Krediye uygun lüks daire.",
            isVIP: false,
            date: "Dün"
        }
    ];

    function InstallButton() {
        const [deferredPrompt, setDeferredPrompt] = useState(null);
        const [isIOS, setIsIOS] = useState(false);
        const [isStandalone, setIsStandalone] = useState(false);

        useEffect(() => {
            if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
                setIsStandalone(true);
                return;
            }
            const userAgent = window.navigator.userAgent.toLowerCase();
            if (/iphone|ipad|ipod/.test(userAgent)) setIsIOS(true);
            
            const handleBeforeInstallPrompt = (e) => {
                e.preventDefault();
                setDeferredPrompt(e);
            };
            window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
            return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
        }, []);

        const handleInstallClick = async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') setDeferredPrompt(null);
            } else if (isIOS) {
                alert("iPhone'da uygulamayı indirmek için:\n\n1. Alt menüdeki 'Paylaş' ikonuna dokunun.\n2. Çıkan menüde 'Ana Ekrana Ekle' seçeneğini seçin.");
            }
        };

        if (isStandalone || (!deferredPrompt && !isIOS)) return null;

        return (
            <div className="fixed bottom-4 left-4 right-4 z-50 sm:hidden">
                <div className="bg-portal-navy p-3.5 rounded-2xl shadow-2xl flex items-center justify-between border border-white/10 glass-panel">
                    <div className="flex items-center gap-3">
                        <div className="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center text-white">
                            <i className="fa-solid fa-mobile-screen-button text-xl"></i>
                        </div>
                        <div className="flex flex-col">
                            <span className="text-white text-sm font-bold font-montserrat tracking-wide">Silopi Sahibinden</span>
                            <span className="text-gray-300 text-[10px] font-medium">Uygulamayı hemen indir</span>
                        </div>
                    </div>
                    <button onClick={handleInstallClick} className="bg-portal-red text-white text-xs font-bold px-4 py-2.5 rounded-xl hover:bg-red-600 transition-colors shadow-lg shadow-red-500/30">
                        İNDİR
                    </button>
                </div>
            </div>
        );
    }

    function ListingCard({ listing, onClick }) {
        if (!listing) return null;
        return (
            <div onClick={onClick} className="group bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-card-hover border border-portal-border hover:border-portal-navy/20 transition-all duration-300 cursor-pointer flex flex-row sm:flex-col mb-3 sm:mb-0 transform hover:-translate-y-1">
                <div className="w-[130px] h-[120px] sm:w-full sm:h-[200px] shrink-0 relative bg-gray-100 overflow-hidden">
                    <img 
                        src={listing.image || 'https://images.unsplash.com/photo-1549399542-7e3f8b79c341?q=80&w=300&auto=format&fit=crop'} 
                        alt={listing.name || 'İlan Görseli'} 
                        className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
                    />
                    <div className="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                    
                    {listing.isVIP && (
                        <div className="absolute top-2.5 left-2.5 bg-portal-red text-white text-[10px] font-bold px-2.5 py-1 rounded-md uppercase tracking-wider shadow-lg shadow-red-500/40 z-10">
                            VIP İLAN
                        </div>
                    )}
                </div>
                
                <div className="p-3.5 sm:p-5 flex flex-col flex-1 min-w-0 bg-white relative z-10">
                    <div className="flex items-center justify-between mb-1.5">
                        <span className="text-portal-red font-bold text-[11px] uppercase tracking-wider">{listing.category || 'Araç'}</span>
                        <span className="text-gray-400 text-[11px] font-medium hidden sm:block bg-gray-50 px-2 py-0.5 rounded-md">{listing.date || 'Bugün'}</span>
                    </div>
                    
                    <h3 className="font-bold text-sm sm:text-base text-portal-navy line-clamp-2 leading-snug mb-3 group-hover:text-portal-red transition-colors">
                        {listing.name || 'İlan Başlığı'}
                    </h3>
                    
                    <div className="mt-auto border-t border-gray-100 pt-3">
                        <div className="flex items-center text-portal-gray text-[12px] mb-1.5 font-medium truncate">
                            <i className="fa-solid fa-location-dot mr-1.5 text-portal-navy/50"></i>
                            <span className="truncate">{listing.location || 'Silopi, Merkez'}</span>
                        </div>
                        <div className="font-black text-portal-navy text-lg sm:text-xl tracking-tight">
                            {listing.price ? `${listing.price} TL` : 'Fiyat Sorun'}
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    function App() {
        const [view, setView] = useState('home');
        const [user, setUser] = useState(null);
        const [loading, setLoading] = useState(true);
        
        const [vehicles, setVehicles] = useState(DEMO_VERILER);

        // --- ARAMA VE FİLTRELEME STATE'LERİ ---
        const [searchQuery, setSearchQuery] = useState('');
        const [selectedCategory, setSelectedCategory] = useState('All');

        const [loginEmail, setLoginEmail] = useState('');
        const [loginPassword, setLoginPassword] = useState('');
        const [loginError, setLoginError] = useState('');

        const [editingVehicle, setEditingVehicle] = useState(null);
        const [vehName, setVehName] = useState('');
        const [vehCategory, setVehCategory] = useState('Araç');
        const [vehPrice, setVehPrice] = useState('');
        const [vehLocation, setVehLocation] = useState('Silopi, Merkez');
        const [vehDesc, setVehDesc] = useState('');
        const [vehImg, setVehImg] = useState('');
        const [vehFile, setVehFile] = useState(null);
        const [vehVIP, setVehVIP] = useState(false);
        const [uploading, setUploading] = useState(false);

        useEffect(() => {
            const handleHashChange = () => {
                if (window.location.hash === '#/admin') {
                    if (user) setView('admin-panel');
                    else setView('admin-login');
                } else {
                    setView('home');
                }
            };
            window.addEventListener('hashchange', handleHashChange);
            handleHashChange();
            
            setTimeout(() => {
                setLoading(false);
            }, 300);
            
            return () => window.removeEventListener('hashchange', handleHashChange);
        }, [user]);

        // --- ARAMA VE FİLTRELEME MANTIĞI ---
        const filteredVehicles = useMemo(() => {
            return vehicles.filter(v => {
                // Kategori Filtresi
                const matchCategory = selectedCategory === 'All' || v.category === selectedCategory;
                // Kelime Arama Filtresi (Başlık ve Konumda Arar)
                const query = searchQuery.toLowerCase();
                const matchSearch = (v.name && v.name.toLowerCase().includes(query)) || 
                                    (v.location && v.location.toLowerCase().includes(query));
                
                return matchCategory && matchSearch;
            }).sort((a,b) => (b.isVIP ? 1 : 0) - (a.isVIP ? 1 : 0));
        }, [vehicles, searchQuery, selectedCategory]);

        const handleVehFileChange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            setVehFile(file);
            const reader = new FileReader();
            reader.onloadend = () => setVehImg(reader.result);
            reader.readAsDataURL(file);
        };

        const handleLogin = (e) => {
            e.preventDefault();
            setLoginError('');
            if (loginEmail === 'admin@admin.com' && loginPassword === '123456') {
                setUser({ email: loginEmail });
                window.location.hash = '#/admin';
            } else {
                setLoginError('Hatalı giriş! E-posta: admin@admin.com Şifre: 123456');
            }
        };

        const handleLogout = () => {
            setUser(null);
            window.location.hash = '';
            setView('home');
        };

        const saveVehicle = (e) => {
            e.preventDefault();
            if (!vehFile && !(editingVehicle ? editingVehicle.image : null) && !vehImg) {
                alert('Lütfen ilan için bir fotoğraf yükleyin!');
                return;
            }
            setUploading(true);
            
            setTimeout(() => {
                let imageUrl = vehImg || (editingVehicle ? editingVehicle.image : '') || '';
                const data = { 
                    id: editingVehicle ? editingVehicle.id : Date.now(),
                    name: vehName, 
                    category: vehCategory,
                    price: vehPrice,
                    location: vehLocation,
                    image: imageUrl, 
                    description: vehDesc,
                    isVIP: vehVIP,
                    date: 'Bugün'
                };

                if (editingVehicle) {
                    setVehicles(vehicles.map(v => v.id === editingVehicle.id ? data : v));
                    setEditingVehicle(null);
                } else {
                    setVehicles([...vehicles, data]);
                }
                setVehName(''); setVehCategory('Araç'); setVehPrice(''); setVehLocation('Silopi, Merkez'); setVehImg(''); setVehDesc(''); setVehFile(null); setVehVIP(false);
                setUploading(false);
                alert('Demo modunda ilan başarıyla kaydedildi!');
            }, 500);
        };

        const deleteVehicle = (id) => {
            if (confirm('Bu ilanı silmek istediğinize emin misiniz?')) {
                setVehicles(vehicles.filter(v => v.id !== id));
            }
        };

        if (loading) {
            return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-portal-bg">
                    <i className="fa-solid fa-spinner fa-spin text-4xl text-portal-red mb-4"></i>
                    <h2 className="text-xl font-black text-portal-navy font-montserrat">SİLOPİ SAHİBİNDEN</h2>
                    <p className="text-sm font-medium text-portal-gray mt-1">Yükleniyor...</p>
                </div>
            );
        }

        if (view === 'admin-login') {
            return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-portal-bg">
                    <div className="w-full max-w-sm bg-white rounded-3xl p-8 border border-portal-border shadow-xl">
                        <h2 className="text-2xl font-black font-montserrat text-center text-portal-navy mb-3">Yönetici Girişi</h2>
                        <div className="bg-yellow-50 border border-yellow-200 text-xs text-center text-yellow-800 p-2 rounded-lg mb-6">
                            Demo E-posta: <b>admin@admin.com</b><br/>Demo Şifre: <b>123456</b>
                        </div>
                        {loginError && <div className="bg-red-50 text-portal-red p-3 rounded-xl text-sm font-medium text-center mb-6">{loginError}</div>}
                        <form onSubmit={handleLogin} className="space-y-4">
                            <div>
                                <label className="block text-[11px] font-bold text-portal-gray mb-1 uppercase tracking-wide">E-Posta</label>
                                <input type="email" required className="w-full bg-gray-50 border border-portal-border rounded-xl px-4 py-3.5 text-sm focus:border-portal-navy focus:ring-1 focus:ring-portal-navy transition-all" placeholder="admin@admin.com" value={loginEmail} onChange={e=>setLoginEmail(e.target.value)}/>
                            </div>
                            <div>
                                <label className="block text-[11px] font-bold text-portal-gray mb-1 uppercase tracking-wide">Şifre</label>
                                <input type="password" required className="w-full bg-gray-50 border border-portal-border rounded-xl px-4 py-3.5 text-sm focus:border-portal-navy focus:ring-1 focus:ring-portal-navy transition-all" placeholder="••••••" value={loginPassword} onChange={e=>setLoginPassword(e.target.value)}/>
                            </div>
                            <button type="submit" className="w-full bg-portal-navy text-white font-bold py-3.5 rounded-xl text-sm transition-colors hover:bg-gray-800 mt-2 shadow-lg shadow-portal-navy/30">Giriş Yap</button>
                        </form>
                    </div>
                </div>
            );
        }

        if (view === 'admin-panel') {
            return (
                <div className="min-h-screen flex flex-col bg-portal-bg pb-10">
                    <header className="bg-white border-b border-portal-border py-4 px-4 sm:px-6 flex justify-between items-center sticky top-0 z-50 shadow-sm">
                        <h1 className="text-lg sm:text-xl font-black font-montserrat text-portal-navy">SİLOPİ SAHİBİNDEN <span className="text-xs sm:text-sm font-semibold text-portal-gray ml-2">/ Demo Admin</span></h1>
                        <button onClick={handleLogout} className="bg-red-50 text-portal-red text-xs sm:text-sm font-bold px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg hover:bg-red-100 transition-colors">Çıkış Yap</button>
                    </header>
                    <div className="flex-1 max-w-7xl w-full mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6 mt-4">
                        <div className="lg:col-span-1 space-y-6">
                            <div className="bg-white rounded-2xl p-6 border border-portal-border shadow-xl">
                                <h3 className="font-black text-lg text-portal-navy mb-5 border-b border-gray-100 pb-3">{editingVehicle ? 'İlanı Düzenle' : 'Yeni İlan Ekle'}</h3>
                                <form onSubmit={saveVehicle} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-portal-gray mb-1">İLAN BAŞLIĞI</label>
                                        <input type="text" required className="w-full bg-gray-50 border border-portal-border text-sm rounded-xl px-4 py-3" placeholder="Örn: 2020 Model Temiz Passat" value={vehName} onChange={e=>setVehName(e.target.value)}/>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="block text-xs font-bold text-portal-gray mb-1">KATEGORİ</label>
                                            <select className="w-full bg-gray-50 border border-portal-border text-sm rounded-xl px-3 py-3 font-medium text-portal-navy" value={vehCategory} onChange={e=>setVehCategory(e.target.value)}>
                                                <option value="Araç">Araç</option>
                                                <option value="Ev / Arsa">Ev / Arsa</option>
                                                <option value="Kiralık">Kiralık</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-portal-gray mb-1">FİYAT (TL)</label>
                                            <input type="text" className="w-full bg-gray-50 border border-portal-border text-sm rounded-xl px-3 py-3" placeholder="Örn: 850.000" value={vehPrice} onChange={e=>setVehPrice(e.target.value)}/>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-portal-gray mb-1">KONUM</label>
                                        <input type="text" className="w-full bg-gray-50 border border-portal-border text-sm rounded-xl px-4 py-3" placeholder="Örn: Silopi, Merkez" value={vehLocation} onChange={e=>setVehLocation(e.target.value)}/>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-portal-gray mb-1">İLAN FOTOĞRAFI</label>
                                        <label className="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer bg-gray-50 hover:border-portal-navy hover:bg-gray-100 transition-colors overflow-hidden">
                                            {vehImg ? <img src={vehImg} className="w-full h-full object-cover"/> : <div className="text-center"><i className="fa-solid fa-cloud-arrow-up text-2xl text-gray-400 mb-2"></i><span className="block text-xs text-portal-navy font-bold">Fotoğraf Yükle</span></div>}
                                            <input type="file" accept="image/*" className="hidden" onChange={handleVehFileChange}/>
                                        </label>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-portal-gray mb-1">AÇIKLAMA</label>
                                        <textarea required rows="4" className="w-full bg-gray-50 border border-portal-border text-sm rounded-xl px-4 py-3 resize-none" placeholder="İlan detaylarını buraya yazın..." value={vehDesc} onChange={e=>setVehDesc(e.target.value)}></textarea>
                                    </div>
                                    <div className="bg-gray-50 p-4 rounded-xl border border-gray-200">
                                        <label className="flex items-center gap-3 cursor-pointer">
                                            <input type="checkbox" checked={vehVIP} onChange={e=>setVehVIP(e.target.checked)} className="rounded text-portal-red focus:ring-portal-red w-5 h-5"/>
                                            <div className="flex flex-col">
                                                <span className="text-sm font-bold text-portal-navy">VIP (Öne Çıkan İlan)</span>
                                                <span className="text-[10px] text-portal-gray">Bu ilan ana sayfada her zaman en üstte renkli görünür.</span>
                                            </div>
                                        </label>
                                    </div>
                                    <button type="submit" disabled={uploading} className="w-full bg-portal-navy text-white text-sm font-bold py-4 rounded-xl shadow-lg shadow-portal-navy/30 hover:bg-gray-800 transition-colors disabled:opacity-50">
                                        {uploading ? 'KAYDEDİLİYOR...' : 'İLAN KAYDET'}
                                    </button>
                                </form>
                            </div>
                        </div>
                        <div className="lg:col-span-2 space-y-6">
                            <div className="bg-white rounded-2xl p-6 border border-portal-border shadow-xl">
                                <h3 className="font-black text-lg text-portal-navy mb-5 border-b border-gray-100 pb-3">Sistemde Kayıtlı İlanlar ({(vehicles || []).length})</h3>
                                <div className="space-y-3 max-h-[750px] overflow-y-auto pr-2 no-scrollbar">
                                    {[...(vehicles || [])].sort((a,b) => (b.isVIP ? 1 : 0) - (a.isVIP ? 1 : 0)).map(v => (
                                        <div key={v.id} className="flex flex-col sm:flex-row gap-4 bg-white p-3.5 rounded-xl border border-portal-border items-center hover:shadow-md transition-shadow">
                                            <img src={v.image} className="w-full sm:w-28 h-32 sm:h-20 object-cover rounded-lg shrink-0 bg-gray-100"/>
                                            <div className="flex-1 min-w-0 text-center sm:text-left">
                                                <div className="flex items-center justify-center sm:justify-start gap-2 mb-1">
                                                    {v.isVIP && <span className="bg-portal-red text-white text-[9px] font-bold px-1.5 py-0.5 rounded">VIP</span>}
                                                    <span className="text-xs font-bold text-portal-gray">{v.category}</span>
                                                </div>
                                                <div className="font-bold text-sm sm:text-base text-portal-navy truncate mb-1">{v.name}</div>
                                                <div className="text-sm font-black text-portal-navy">{v.price} TL</div>
                                            </div>
                                            <div className="flex w-full sm:w-auto gap-2 mt-2 sm:mt-0">
                                                <button onClick={()=>{ setEditingVehicle(v); setVehName(v.name); setVehCategory(v.category); setVehPrice(v.price); setVehLocation(v.location); setVehImg(v.image); setVehDesc(v.description); setVehVIP(v.isVIP); setVehFile(null); }} className="flex-1 sm:flex-none text-portal-navy bg-gray-50 border border-portal-border px-4 py-2.5 rounded-xl text-xs font-bold hover:bg-gray-100 transition-colors">Düzenle</button>
                                                <button onClick={()=>deleteVehicle(v.id)} className="flex-1 sm:flex-none text-portal-red bg-red-50 border border-red-100 px-4 py-2.5 rounded-xl text-xs font-bold hover:bg-red-100 transition-colors">Sil</button>
                                            </div>
                                        </div>
                                    ))}
                                    {(!vehicles || vehicles.length === 0) && <div className="text-center py-10"><i className="fa-regular fa-folder-open text-3xl text-gray-300 mb-2"></i><p className="text-sm font-medium text-gray-500">Sistemde kayıtlı ilan bulunmuyor.</p></div>}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- ANA SAYFA ---
        return (
            <div className="min-h-screen flex flex-col bg-portal-bg">
                <InstallButton />
                
                <header className="bg-white/95 backdrop-blur-md border-b border-portal-border sticky top-0 z-40 shadow-sm">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 h-16 sm:h-20 flex justify-between items-center">
                        <div className="flex items-center gap-2 sm:gap-3 cursor-pointer">
                            <div className="w-8 h-8 sm:w-10 sm:h-10 bg-portal-red rounded-lg flex items-center justify-center text-white shadow-lg shadow-red-500/30">
                                <i className="fa-solid fa-location-dot sm:text-xl"></i>
                            </div>
                            <h1 className="text-xl sm:text-2xl font-black font-montserrat tracking-tight text-portal-navy">
                                <span className="text-portal-red">SİLOPİ</span> SAHİBİNDEN
                            </h1>
                        </div>
                        <a href={`whatsapp://send?phone=${WHATSAPP_NUMBER}&text=Merhaba,%20ilan%20vermek%20istiyorum.`} className="bg-gradient-to-r from-portal-navy to-gray-800 text-white text-[11px] sm:text-sm font-bold px-4 py-2.5 sm:px-6 sm:py-3 rounded-xl hover:shadow-lg transition-all shadow-md flex items-center gap-2 mobile-touch-active">
                            <i className="fa-solid fa-plus text-portal-red"></i>
                            <span className="hidden sm:inline">Hemen İlan Ver</span>
                            <span className="sm:hidden">İlan Ver</span>

                    <div className="relative z-10 max-w-4xl mx-auto text-center">
                        <span className="inline-block py-1.5 px-4 rounded-full bg-white/10 border border-white/20 text-white text-xs font-bold tracking-widest uppercase mb-5 backdrop-blur-md">
                            YENİ NESİL İLAN PLATFORMU
                        </span>
                        <h2 className="text-3xl sm:text-5xl md:text-6xl font-black font-montserrat text-white mb-6 tracking-tight leading-tight">
                            Silopi'nin En Güvenilir <br className="hidden sm:block"/> <span className="text-gradient">İlan Pazarı</span>
                        </h2>
                        <p className="text-gray-300 text-sm sm:text-lg font-medium mb-10 max-w-2xl mx-auto leading-relaxed">
                            Araç, ev, arsa ve kiralık ilanları doğrudan gerçek sahiplerinden. Aracısız, güvenilir ve hızlı.
                        </p>
                        
                        <div className="glass-search p-2 sm:p-2.5 rounded-2xl flex shadow-glass max-w-3xl mx-auto transition-transform hover:scale-[1.01] duration-300">
                            <div className="flex-1 flex items-center px-3 sm:px-5">
                                <i className="fa-solid fa-magnifying-glass text-portal-navy/50 text-lg mr-3"></i>
                                <input 
                                    type="text" 
                                    placeholder="Kelime, marka veya mahalle ara..." 
                                    className="w-full bg-transparent border-none focus:ring-0 text-sm sm:text-base font-medium text-portal-navy placeholder-portal-navy/40 outline-none" 
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                            </div>
                            <button onClick={() => document.getElementById('ilanlar-bolumu').scrollIntoView({behavior: 'smooth'})} className="bg-portal-red text-white px-6 py-3 sm:px-8 sm:py-3.5 rounded-xl font-bold text-sm sm:text-base hover:bg-red-700 transition-colors shadow-lg shadow-red-500/20">
                                Ara
                            </button>
                        </div>
                    </div>
                </section>

                            {icon: 'fa-house-chimney', label: 'Emlak', val: 'Ev / Arsa', color: 'text-emerald-600', bg: 'bg-emerald-50', activeBg: 'bg-emerald-600', activeText: 'text-white'}, 
                            {icon: 'fa-key', label: 'Kiralık', val: 'Kiralık', color: 'text-purple-600', bg: 'bg-purple-50', activeBg: 'bg-purple-600', activeText: 'text-white'}
                        ].map((cat, i) => {
                            const isActive = selectedCategory === cat.val;
                            return (
                                <button 
                                    key={i}

                                        <i className={`fa-solid ${cat.icon}`}></i>
                                    </div>
                                    <span className={`text-xs sm:text-[15px] font-bold transition-colors ${isActive ? 'text-portal-red' : 'text-portal-navy group-hover:text-portal-red'}`}>{cat.label}</span>
                                </button>
                            );
                        })}

                </section>

                <section id="ilanlar-bolumu" className="py-16 max-w-7xl w-full mx-auto px-4 sm:px-6 z-10 scroll-mt-20">

                        <div className="w-1.5 h-8 bg-portal-red rounded-full"></div>
                        <h2 className="text-2xl sm:text-3xl font-black font-montserrat tracking-tight text-portal-navy">

                            </div>
                        )}

                        <a href={`whatsapp://send?phone=${WHATSAPP_NUMBER}&text=Merhaba,%20ilan%20vermek%20istiyorum.`} className="relative z-10 shrink-0 bg-portal-red text-white font-bold text-sm sm:text-base px-8 py-4 rounded-xl hover:bg-red-600 transition-all shadow-lg shadow-red-500/30 flex items-center gap-2 group mobile-touch-active">
                            <i className="fa-brands fa-whatsapp text-xl group-hover:scale-110 transition-transform"></i>
                            İlan Vermek İstiyorum
                        </a>
                    </div>
                </section>

                <footer className="py-8 bg-white text-center">
                    <div className="flex items-center justify-center gap-2 mb-3">
                        <i className="fa-solid fa-location-dot text-portal-red"></i>
                        <span className="text-lg font-black font-montserrat tracking-tight text-portal-navy">SİLOPİ SAHİBİNDEN</span>
                    </div>
                    <p className="text-[11px] font-bold text-portal-gray uppercase tracking-widest">

                    </p>
                </footer>
            </div>
        );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
</script>
</body>
</html>
