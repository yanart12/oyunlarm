<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <meta name="theme-color" content="#0A1931"/>
    <title>Silopi Sahibinden | İlan Platformu</title>
    
    <!-- SADECE TAILWIND VE FONT KALDI. ÇÖKEN TÜM REACT/BABEL KODLARI SİLİNDİ! -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "portal-navy": "#0A1931",
                        "portal-red": "#E61C24",
                        "portal-bg": "#F5F7FA",
                        "portal-gray": "#64748B",
                        "portal-border": "#E2E8F0"
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif']
                    },
                    boxShadow: {
                        'premium': '0 10px 40px -10px rgba(10,25,49,0.1)',
                        'card-hover': '0 20px 40px -10px rgba(10,25,49,0.15)',
                        'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.1)'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F5F7FA; color: #0A1931; -webkit-tap-highlight-color: transparent; }
        .mobile-touch-active:active { transform: scale(0.98); opacity: 0.9; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .portal-hero {
            background-image: url('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            position: relative;
        }
        
        .portal-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(10,25,49,0.85) 0%, rgba(230,28,36,0.35) 100%);
            z-index: 0;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .glass-search {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: linear-gradient(90deg, #FFFFFF, #FFE5E5);
        }
    </style>
</head>
<body class="font-sans antialiased select-none md:select-text">

<div id="app">
    <!-- Sayfa yüklenirken burası görünür -->
    <div style="text-align:center; padding: 60px 20px; font-family: sans-serif; color: #0A1931;">
        <i class="fa-solid fa-spinner fa-spin" style="font-size: 40px; color: #E61C24; margin-bottom: 15px;"></i>
        <h2 style="font-weight: bold; margin-bottom: 5px;">Silopi Sahibinden Yükleniyor...</h2>
    </div>
</div>

<!-- SAF HTML/JS KODU (REACT VEYA BABEL YOK) -->
<script>
    const WHATSAPP_NUMBER = "905443894007";

    let vehicles = [
        {
            id: 1001,
            name: "2020 Model Temiz Passat 1.5 TSI Business",
            category: "Araç",
            price: "1.450.000",
            location: "Silopi, Yenişehir Mah.",
            image: "https://images.unsplash.com/photo-1549399542-7e3f8b79c341?q=80&w=800&auto=format&fit=crop",
            description: "Aracım hatasız, boyasız ve tramersizdir. Aile aracı olarak özenle kullanılmış olup tüm bakımları zamanında yetkili servisinde yapılmıştır.\n\n- Orijinal kilometre\n- Yedek anahtarı ve kitapçıkları mevcuttur\n- İstenilen ekspertize gösterilebilir.",
            isVIP: true,
            date: "Bugün"
        },
        {
            id: 1002,
            name: "Merkezde 3+1 Lüks Satılık Daire",
            category: "Ev / Arsa",
            price: "2.100.000",
            location: "Silopi, Ofis Mah.",
            image: "https://images.unsplash.com/photo-1564013799919-ab600027ffc6?q=80&w=800&auto=format&fit=crop",
            description: "Ofis Mahallesi'nin en güzel konumunda, okullara, marketlere ve ulaşım araçlarına yürüme mesafesindeki dairemiz satılıktır.\n\n- 3 Oda 1 Salon, Geniş ve Ferah\n- Güney Cephe (Sürekli güneş alır)\n- Krediye uygun, masrafsızdır.\n- Ebeveyn banyosu bulunmaktadır.",
            isVIP: false,
            date: "Dün"
        }
    ];

    let currentUser = null;
    let editId = null;
    let uploadedImg = '';
    let searchQuery = '';
    let selectedCategory = 'All';

    // Sayfa Yönlendirme Kontrolü
    function route() {
        const hash = window.location.hash;
        if (hash === '#/admin') {
            if (currentUser) renderAdminPanel();
            else renderAdminLogin();
        } else if (hash.startsWith('#/ilan/')) {
            const id = parseInt(hash.split('/')[2]);
            renderDetail(id);
        } else {
            renderHome();
        }
    }

    // Arama ve Filtreleme Fonksiyonları
    function handleSearch(val) {
        searchQuery = val;
        renderListings();
    }

    function setCategory(cat) {
        if (selectedCategory === cat) {
            selectedCategory = 'All';
        } else {
            selectedCategory = cat;
        }
        renderCategories(); 
        renderListings();   
        document.getElementById('ilanlar-bolumu').scrollIntoView({behavior: 'smooth', block: 'start'});
    }

    function clearFilters() {
        searchQuery = '';
        selectedCategory = 'All';
        const input = document.getElementById('searchInput');
        if(input) input.value = '';
        renderCategories();
        renderListings();
    }

    // Kategorileri (Butonları) Çizme
    function renderCategories() {
        const container = document.getElementById('category-container');
        if(!container) return;

        const cats = [
            {icon: 'fa-car-side', label: 'Araç', val: 'Araç', color: 'text-blue-600', bg: 'bg-blue-50', activeBg: 'bg-blue-600', activeText: 'text-white'}, 
            {icon: 'fa-house-chimney', label: 'Emlak', val: 'Ev / Arsa', color: 'text-emerald-600', bg: 'bg-emerald-50', activeBg: 'bg-emerald-600', activeText: 'text-white'}, 
            {icon: 'fa-key', label: 'Kiralık', val: 'Kiralık', color: 'text-purple-600', bg: 'bg-purple-50', activeBg: 'bg-purple-600', activeText: 'text-white'}
        ];

        container.innerHTML = cats.map(c => {
            let isActive = selectedCategory === c.val;
            let activeClasses = isActive ? `${c.activeBg} ${c.activeText} scale-110 shadow-lg` : `${c.bg} ${c.color} hover:-translate-y-2 hover:shadow-md`;
            let textClasses = isActive ? 'text-portal-red' : 'text-portal-navy group-hover:text-portal-red';
            return `
                <button onclick="setCategory('${c.val}')" class="flex flex-col items-center gap-3 sm:gap-4 group cursor-pointer transition-transform">
                    <div class="w-14 h-14 sm:w-20 sm:h-20 rounded-2xl flex items-center justify-center text-2xl sm:text-3xl shadow-sm border border-black/5 transition-all duration-300 ${activeClasses}">
                        <i class="fa-solid ${c.icon}"></i>
                    </div>
                    <span class="text-xs sm:text-[15px] font-bold transition-colors ${textClasses}">${c.label}</span>
                </button>
            `;
        }).join('');
    }

    // İlanları Ekrana Çizme
    function renderListings() {
        const container = document.getElementById('listings-container');
        const titleEl = document.getElementById('listings-title');
        const countSpan = document.getElementById('listings-count');
        if(!container) return;

        let filtered = vehicles.filter(v => {
            let matchCat = selectedCategory === 'All' || v.category === selectedCategory;
            let query = searchQuery.toLowerCase();
            let matchSearch = (v.name && v.name.toLowerCase().includes(query)) || 
                              (v.location && v.location.toLowerCase().includes(query));
            return matchCat && matchSearch;
        }).sort((a,b) => (b.isVIP ? 1 : 0) - (a.isVIP ? 1 : 0));

        if(titleEl) titleEl.innerText = (selectedCategory === 'All' && !searchQuery) ? 'VİTRİN İLANLARI' : 'ARAMA SONUÇLARI';
        if(countSpan) countSpan.innerText = filtered.length + ' İlan';

        if (filtered.length > 0) {
            container.innerHTML = filtered.map(v => `
                <div class="group bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-card-hover border border-portal-border hover:border-portal-navy/20 transition-all duration-300 cursor-pointer flex flex-row sm:flex-col mb-3 sm:mb-0 transform hover:-translate-y-1" onclick="window.location.hash = '#/ilan/${v.id}'">
                    <div class="w-[130px] h-[120px] sm:w-full sm:h-[200px] shrink-0 relative bg-gray-100 overflow-hidden">
                        <img src="${v.image}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"/>
                        <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                        ${v.isVIP ? `<div class="absolute top-2.5 left-2.5 bg-portal-red text-white text-[10px] font-bold px-2.5 py-1 rounded-md uppercase tracking-wider shadow-lg shadow-red-500/40 z-10">VIP İLAN</div>` : ''}
                    </div>
                    <div class="p-3.5 sm:p-5 flex flex-col flex-1 min-w-0 bg-white relative z-10">
                        <div class="flex items-center justify-between mb-1.5">
                            <span class="text-portal-red font-bold text-[11px] uppercase tracking-wider">${v.category}</span>
                            <span class="text-gray-400 text-[11px] font-medium hidden sm:block bg-gray-50 px-2 py-0.5 rounded-md">${v.date}</span>
                        </div>
                        <h3 class="font-bold text-sm sm:text-base text-portal-navy line-clamp-2 leading-snug mb-3 group-hover:text-portal-red transition-colors">${v.name}</h3>
                        <div class="mt-auto border-t border-gray-100 pt-3">
                            <div class="flex items-center text-portal-gray text-[12px] mb-1.5 font-medium truncate">
                                <i class="fa-solid fa-location-dot mr-1.5 text-portal-navy/50"></i>
                                <span class="truncate">${v.location}</span>
                            </div>
                            <div class="font-black text-portal-navy text-lg sm:text-xl tracking-tight">${v.price ? v.price + ' TL' : 'Fiyat Sorun'}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        } else {
            container.innerHTML = `
                <div class="col-span-full py-20 flex flex-col items-center justify-center bg-white rounded-3xl border border-dashed border-gray-300">
                    <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mb-4">
                        <i class="fa-solid fa-box-open text-4xl text-portal-gray/50"></i>
                    </div>
                    <span class="text-portal-navy font-bold text-lg mb-1">İlan Bulunamadı</span>
                    <span class="text-portal-gray text-sm font-medium">Aradığınız kriterlere uygun ilan mevcut değil.</span>
                    <button onclick="clearFilters()" class="mt-4 text-portal-red font-bold text-sm hover:underline">Filtreleri Temizle</button>
                </div>
            `;
        }
    }

    // Ortak Header
    const appHeader = `
        <header class="bg-white/95 backdrop-blur-md border-b border-portal-border sticky top-0 z-40 shadow-sm">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 h-16 sm:h-20 flex justify-between items-center">
                <div class="flex items-center gap-2 sm:gap-3 cursor-pointer" onclick="window.location.hash=''">
                    <div class="w-8 h-8 sm:w-10 sm:h-10 bg-portal-red rounded-lg flex items-center justify-center text-white shadow-lg shadow-red-500/30">
                        <i class="fa-solid fa-location-dot sm:text-xl"></i>
                    </div>
                    <h1 class="text-xl sm:text-2xl font-black font-montserrat tracking-tight text-portal-navy">
                        <span class="text-portal-red">SİLOPİ</span> SAHİBİNDEN
                    </h1>
                </div>
                <a href="whatsapp://send?phone=${WHATSAPP_NUMBER}&text=Merhaba,%20ilan%20vermek%20istiyorum." class="bg-gradient-to-r from-portal-navy to-gray-800 text-white text-[11px] sm:text-sm font-bold px-4 py-2.5 sm:px-6 sm:py-3 rounded-xl hover:shadow-lg transition-all shadow-md flex items-center gap-2 mobile-touch-active">
                    <i class="fa-solid fa-plus text-portal-red"></i>
                    <span class="hidden sm:inline">Hemen İlan Ver</span>
                    <span class="sm:hidden">İlan Ver</span>
                </a>
            </div>
        </header>
    `;

    // --- DETAY SAYFASI ÇİZİMİ ---
    function renderDetail(id) {
        const app = document.getElementById('app');
        const v = vehicles.find(x => x.id === id);
        window.scrollTo(0, 0); 

        if (!v) {
            app.innerHTML = `
                <div class="min-h-screen flex flex-col bg-portal-bg">
                    ${appHeader}
                    <div class="flex-1 flex flex-col items-center justify-center py-20 text-center">
                        <i class="fa-solid fa-triangle-exclamation text-5xl text-gray-300 mb-4"></i>
                        <h2 class="text-2xl font-bold text-portal-navy mb-2">İlan Bulunamadı</h2>
                        <button onclick="window.location.hash=''" class="text-portal-red font-bold hover:underline">Ana Sayfaya Dön</button>
                    </div>
                </div>
            `;
            return;
        }

        const msgText = encodeURIComponent(`Merhaba, Silopi Sahibinden'de gördüğüm #${v.id} numaralı ilanınız (${v.name}) hakkında bilgi almak istiyorum.`);

        app.innerHTML = `
            <div class="min-h-screen flex flex-col bg-portal-bg">
                ${appHeader}
                
                <main class="flex-1 max-w-7xl w-full mx-auto px-4 py-6 sm:py-10">
                    <div class="flex flex-wrap items-center gap-2 sm:gap-3 mb-6 sm:mb-8 text-xs sm:text-sm">
                        <button onclick="window.location.hash=''" class="flex items-center gap-1.5 bg-white border border-portal-border px-3 py-1.5 rounded-lg text-portal-navy hover:bg-gray-50 transition-colors font-bold shadow-sm">
                            <i class="fa-solid fa-arrow-left"></i> Geri Dön
                        </button>
                        <span class="text-gray-300 hidden sm:inline">|</span>
                        <span class="text-portal-gray hidden sm:inline">Ana Sayfa</span>
                        <span class="text-gray-300">></span>
                        <span class="text-portal-gray font-medium">${v.category}</span>
                        <span class="text-gray-300">></span>
                        <span class="text-portal-navy font-bold truncate max-w-[150px] sm:max-w-xs">${v.name}</span>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 sm:gap-8">
                        <div class="lg:col-span-2 space-y-6">
                            <div class="bg-white rounded-3xl p-2 sm:p-4 shadow-sm border border-portal-border">
                                <div class="aspect-[4/3] w-full relative rounded-2xl overflow-hidden bg-gray-100 border border-black/5">
                                    <img src="${v.image}" class="w-full h-full object-cover hover:scale-105 transition-transform duration-700"/>
                                    ${v.isVIP ? `<div class="absolute top-4 left-4 bg-portal-red text-white text-xs font-bold px-3 py-1.5 rounded-lg shadow-lg">VIP İLAN</div>` : ''}
                                </div>
                            </div>
                            <div class="bg-white rounded-3xl p-6 sm:p-8 shadow-sm border border-portal-border">
                                <h3 class="text-lg sm:text-xl font-black font-montserrat text-portal-navy mb-5 border-b border-gray-100 pb-3 flex items-center gap-2">
                                    <i class="fa-solid fa-list-ul text-portal-red"></i> İlan Açıklaması
                                </h3>
                                <div class="text-portal-gray text-sm sm:text-base leading-relaxed whitespace-pre-wrap">${v.description || 'Bu ilan için detaylı açıklama girilmemiştir.'}</div>
                            </div>
                        </div>

                        <div class="lg:col-span-1 space-y-6">
                            <div class="bg-white rounded-3xl p-6 sm:p-8 shadow-xl border border-portal-border sticky top-28">
                                <div class="text-3xl sm:text-4xl font-black text-portal-navy mb-2 tracking-tight">${v.price ? v.price + ' TL' : 'Fiyat Sorun'}</div>
                                <h1 class="text-lg sm:text-xl font-bold text-portal-navy leading-snug mb-6">${v.name}</h1>
                                
                                <div class="space-y-4 mb-8">
                                    <div class="flex items-center justify-between border-b border-gray-100 pb-3">
                                        <span class="text-portal-gray text-sm font-medium"><i class="fa-solid fa-location-dot w-5 text-portal-red"></i>Konum</span>
                                        <span class="text-portal-navy text-sm font-bold text-right">${v.location}</span>
                                    </div>
                                    <div class="flex items-center justify-between border-b border-gray-100 pb-3">
                                        <span class="text-portal-gray text-sm font-medium"><i class="fa-solid fa-tag w-5 text-portal-red"></i>Kategori</span>
                                        <span class="text-portal-navy text-sm font-bold text-right">${v.category}</span>
                                    </div>
                                    <div class="flex items-center justify-between border-b border-gray-100 pb-3">
                                        <span class="text-portal-gray text-sm font-medium"><i class="fa-regular fa-calendar w-5 text-portal-red"></i>İlan Tarihi</span>
                                        <span class="text-portal-navy text-sm font-bold text-right">${v.date}</span>
                                    </div>
                                    <div class="flex items-center justify-between pb-1">
                                        <span class="text-portal-gray text-sm font-medium"><i class="fa-solid fa-fingerprint w-5 text-portal-red"></i>İlan No</span>
                                        <span class="text-portal-navy text-sm font-bold text-right">#${v.id}</span>
                                    </div>
                                </div>

                                <div class="bg-gray-50 rounded-2xl p-4 mb-6 border border-gray-100 flex items-center gap-4">
                                    <div class="w-12 h-12 bg-portal-navy rounded-full flex items-center justify-center text-white text-xl shadow-sm shrink-0">
                                        <i class="fa-solid fa-user-tie"></i>
                                    </div>
                                    <div>
                                        <div class="text-xs font-bold text-portal-gray uppercase tracking-wider mb-0.5">İlan Sahibi</div>
                                        <div class="text-sm font-black text-portal-navy">Silopi Sahibinden</div>
                                    </div>
                                </div>

                                <a href="whatsapp://send?phone=${WHATSAPP_NUMBER}&text=${msgText}" 
                                   class="w-full flex items-center justify-center gap-2 bg-[#25D366] text-white font-bold text-base px-6 py-4 rounded-2xl hover:bg-[#20b858] transition-colors shadow-lg shadow-green-500/30 mobile-touch-active group">
                                    <i class="fa-brands fa-whatsapp text-2xl group-hover:scale-110 transition-transform"></i>
                                    Mesaj Gönder
                                </a>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        `;
    }

    // --- ANA SAYFA ÇİZİMİ ---
    function renderHome() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="min-h-screen flex flex-col bg-portal-bg">
                ${appHeader}

                <section class="portal-hero pt-14 pb-24 sm:pt-20 sm:pb-32 px-4 relative overflow-hidden z-10">
                    <div class="relative z-10 max-w-4xl mx-auto text-center">
                        <span class="inline-block py-1.5 px-4 rounded-full bg-white/10 border border-white/20 text-white text-xs font-bold tracking-widest uppercase mb-5 backdrop-blur-md">YENİ NESİL İLAN PLATFORMU</span>
                        <h2 class="text-3xl sm:text-5xl md:text-6xl font-black font-montserrat text-white mb-6 tracking-tight leading-tight">
                            Silopi'nin En Güvenilir <br class="hidden sm:block"/> <span class="text-gradient">İlan Pazarı</span>
                        </h2>
                        <p class="text-gray-300 text-sm sm:text-lg font-medium mb-10 max-w-2xl mx-auto leading-relaxed">Araç, ev, arsa ve kiralık ilanları doğrudan gerçek sahiplerinden. Aracısız, güvenilir ve hızlı.</p>
                        
                        <div class="glass-search p-2 sm:p-2.5 rounded-2xl flex shadow-glass max-w-3xl mx-auto transition-transform hover:scale-[1.01] duration-300">
                            <div class="flex-1 flex items-center px-3 sm:px-5">
                                <i class="fa-solid fa-magnifying-glass text-portal-navy/50 text-lg mr-3"></i>
                                <input type="text" id="searchInput" placeholder="Kelime, marka veya mahalle ara..." class="w-full bg-transparent border-none focus:ring-0 text-sm sm:text-base font-medium text-portal-navy placeholder-portal-navy/40 outline-none" oninput="handleSearch(this.value)" autocomplete="off" />
                            </div>
                            <button onclick="document.getElementById('ilanlar-bolumu').scrollIntoView({behavior: 'smooth'})" class="bg-portal-red text-white px-6 py-3 sm:px-8 sm:py-3.5 rounded-xl font-bold text-sm sm:text-base hover:bg-red-700 transition-colors shadow-lg shadow-red-500/20">Ara</button>
                        </div>
                    </div>
                </section>

                <section class="-mt-12 sm:-mt-16 max-w-5xl mx-auto px-4 w-full relative z-20">
                    <div id="category-container" class="bg-white rounded-2xl sm:rounded-3xl shadow-xl p-5 sm:p-8 flex justify-around sm:justify-center sm:gap-16 border border-gray-100">
                    </div>
                </section>

                <section id="ilanlar-bolumu" class="py-16 max-w-7xl w-full mx-auto px-4 sm:px-6 z-10 scroll-mt-20">
                    <div class="flex items-center gap-3 mb-8">
                        <div class="w-1.5 h-8 bg-portal-red rounded-full"></div>
                        <h2 id="listings-title" class="text-2xl sm:text-3xl font-black font-montserrat tracking-tight text-portal-navy">VİTRİN İLANLARI</h2>
                        <span id="listings-count" class="ml-auto text-sm font-bold text-portal-gray bg-white px-3 py-1 rounded-lg border border-gray-200"></span>
                    </div>
                    <div id="listings-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6">
                    </div>
                </section>

                <footer class="py-8 bg-white border-t border-portal-border text-center mt-auto">
                    <div class="flex items-center justify-center gap-2 mb-3">
                        <i class="fa-solid fa-location-dot text-portal-red"></i>
                        <span class="text-lg font-black font-montserrat tracking-tight text-portal-navy">SİLOPİ SAHİBİNDEN</span>
                    </div>
                    <p class="text-[11px] font-bold text-portal-gray uppercase tracking-widest">© 2026 TÜM HAKLARI SAKLIDIR.</p>
                </footer>
            </div>
        `;

        document.getElementById('searchInput').value = searchQuery;
        renderCategories();
        renderListings();
    }

    // --- ADMİN GİRİŞİ ÇİZİMİ ---
    function renderAdminLogin() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="min-h-screen flex items-center justify-center p-4 bg-portal-bg">
                <div class="w-full max-w-sm bg-white rounded-3xl p-8 border border-portal-border shadow-xl">
                    <h2 class="text-2xl font-black font-montserrat text-center text-portal-navy mb-3">Yönetici Girişi</h2>
                    <div class="bg-yellow-50 border border-yellow-200 text-xs text-center text-yellow-800 p-2 rounded-lg mb-6">
                        Demo E-posta: <b>admin@admin.com</b><br/>Demo Şifre: <b>123456</b>
                    </div>
                    <div id="loginError" class="bg-red-50 text-portal-red p-3 rounded-xl text-sm font-medium text-center mb-6 hidden"></div>
                    <form onsubmit="handleLogin(event)" class="space-y-4">
                        <div>
                            <label class="block text-[11px] font-bold text-portal-gray mb-1 uppercase tracking-wide">E-Posta</label>
                            <input type="email" id="loginEmail" required class="w-full bg-gray-50 border border-portal-border rounded-xl px-4 py-3.5 text-sm focus:border-portal-navy focus:ring-1 focus:ring-portal-navy transition-all" placeholder="admin@admin.com"/>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-portal-gray mb-1 uppercase tracking-wide">Şifre</label>
                            <input type="password" id="loginPassword" required class="w-full bg-gray-50 border border-portal-border rounded-xl px-4 py-3.5 text-sm focus:border-portal-navy focus:ring-1 focus:ring-portal-navy transition-all" placeholder="••••••"/>
                        </div>
                        <button type="submit" class="w-full bg-portal-navy text-white font-bold py-3.5 rounded-xl text-sm transition-colors hover:bg-gray-800 mt-2 shadow-lg shadow-portal-navy/30">Giriş Yap</button>
                    </form>
                </div>
            </div>
        `;
    }

    // --- ADMİN PANELİ ÇİZİMİ ---
    function renderAdminPanel() {
        const app = document.getElementById('app');
        
        let listHtml = '';
        const sortedVehicles = [...vehicles].sort((a,b) => (b.isVIP ? 1 : 0) - (a.isVIP ? 1 : 0));
        
        if (sortedVehicles.length > 0) {
            listHtml = sortedVehicles.map(v => `
                <div class="flex flex-col sm:flex-row gap-4 bg-white p-3.5 rounded-xl border border-portal-border items-center hover:shadow-md transition-shadow">
                    <img src="${v.image}" class="w-full sm:w-28 h-32 sm:h-20 object-cover rounded-lg shrink-0 bg-gray-100"/>
                    <div class="flex-1 min-w-0 text-center sm:text-left">
                        <div class="flex items-center justify-center sm:justify-start gap-2 mb-1">
                            ${v.isVIP ? `<span class="bg-portal-red text-white text-[9px] font-bold px-1.5 py-0.5 rounded">VIP</span>` : ''}
                            <span class="text-xs font-bold text-portal-gray">${v.category}</span>
                        </div>
                        <div class="font-bold text-sm sm:text-base text-portal-navy truncate mb-1">${v.name}</div>
                        <div class="text-sm font-black text-portal-navy">${v.price} TL</div>
                    </div>
                    <div class="flex w-full sm:w-auto gap-2 mt-2 sm:mt-0">
                        <button onclick="editVehicle(${v.id})" class="flex-1 sm:flex-none text-portal-navy bg-gray-50 border border-portal-border px-4 py-2.5 rounded-xl text-xs font-bold hover:bg-gray-100 transition-colors">Düzenle</button>
                        <button onclick="deleteVehicle(${v.id})" class="flex-1 sm:flex-none text-portal-red bg-red-50 border border-red-100 px-4 py-2.5 rounded-xl text-xs font-bold hover:bg-red-100 transition-colors">Sil</button>
                    </div>
                </div>
            `).join('');
        } else {
            listHtml = `<div class="text-center py-10"><i class="fa-regular fa-folder-open text-3xl text-gray-300 mb-2"></i><p class="text-sm font-medium text-gray-500">Sistemde kayıtlı ilan bulunmuyor.</p></div>`;
        }

        app.innerHTML = `
            <div class="min-h-screen flex flex-col bg-portal-bg pb-10">
                <header class="bg-white border-b border-portal-border py-4 px-4 sm:px-6 flex justify-between items-center sticky top-0 z-50 shadow-sm">
                    <h1 class="text-lg sm:text-xl font-black font-montserrat text-portal-navy">SİLOPİ SAHİBİNDEN <span class="text-xs sm:text-sm font-semibold text-portal-gray ml-2">/ Demo Admin</span></h1>
                    <button onclick="handleLogout()" class="bg-red-50 text-portal-red text-xs sm:text-sm font-bold px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg hover:bg-red-100 transition-colors">Çıkış Yap</button>
                </header>
                <div class="flex-1 max-w-7xl w-full mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6 mt-4">
                    <div class="lg:col-span-1 space-y-6">
                        <div class="bg-white rounded-2xl p-6 border border-portal-border shadow-xl">
                            <h3 class="font-black text-lg text-portal-navy mb-5 border-b border-gray-100 pb-3">${editId ? 'İlanı Düzenle' : 'Yeni İlan Ekle'}</h3>
                            <form onsubmit="saveVehicle(event)" class="space-y-4">
                                <div>
                                    <label class="block text-xs font-bold text-portal-gray mb-1">İLAN BAŞLIĞI</label>
                                    <input type="text" id="vName" required class="w-full bg-gray-50 border border-portal-border text-sm rounded-xl px-4 py-3" placeholder="Örn: 2020 Model Temiz Passat"/>
                                </div>
                                <div class="grid grid-cols-2 gap-3">
                                    <div>
                                        <label class="block text-xs font-bold text-portal-gray mb-1">KATEGORİ</label>
                                        <select id="vCat" class="w-full bg-gray-50 border border-portal-border text-sm rounded-xl px-3 py-3 font-medium text-portal-navy">
                                            <option value="Araç">Araç</option>
                                            <option value="Ev / Arsa">Ev / Arsa</option>
                                            <option value="Kiralık">Kiralık</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-portal-gray mb-1">FİYAT (TL)</label>
                                        <input type="text" id="vPrice" class="w-full bg-gray-50 border border-portal-border text-sm rounded-xl px-3 py-3" placeholder="Örn: 850.000"/>
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-portal-gray mb-1">KONUM</label>
                                    <input type="text" id="vLoc" class="w-full bg-gray-50 border border-portal-border text-sm rounded-xl px-4 py-3" placeholder="Örn: Silopi, Merkez"/>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-portal-gray mb-1">İLAN FOTOĞRAFI</label>
                                    <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer bg-gray-50 hover:border-portal-navy hover:bg-gray-100 transition-colors overflow-hidden">
                                        ${uploadedImg ? `<img src="${uploadedImg}" class="w-full h-full object-cover"/>` : `<div class="text-center"><i class="fa-solid fa-cloud-arrow-up text-2xl text-gray-400 mb-2"></i><span class="block text-xs text-portal-navy font-bold">Fotoğraf Yükle</span></div>`}
                                        <input type="file" accept="image/*" class="hidden" onchange="handleFile(this)"/>
                                    </label>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-portal-gray mb-1">AÇIKLAMA</label>
                                    <textarea id="vDesc" required rows="4" class="w-full bg-gray-50 border border-portal-border text-sm rounded-xl px-4 py-3 resize-none" placeholder="İlan detaylarını buraya yazın..."></textarea>
                                </div>
                                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                                    <label class="flex items-center gap-3 cursor-pointer">
                                        <input type="checkbox" id="vVIP" class="rounded text-portal-red focus:ring-portal-red w-5 h-5"/>
                                        <div class="flex flex-col">
                                            <span class="text-sm font-bold text-portal-navy">VIP (Öne Çıkan İlan)</span>
                                            <span class="text-[10px] text-portal-gray">Bu ilan ana sayfada en üstte renkli görünür.</span>
                                        </div>
                                    </label>
                                </div>
                                <button type="submit" id="saveBtn" class="w-full bg-portal-navy text-white text-sm font-bold py-4 rounded-xl shadow-lg shadow-portal-navy/30 hover:bg-gray-800 transition-colors">
                                    İLAN KAYDET
                                </button>
                            </form>
                        </div>
                    </div>
                    <div class="lg:col-span-2 space-y-6">
                        <div class="bg-white rounded-2xl p-6 border border-portal-border shadow-xl">
                            <h3 class="font-black text-lg text-portal-navy mb-5 border-b border-gray-100 pb-3">Sistemde Kayıtlı İlanlar (${vehicles.length})</h3>
                            <div class="space-y-3 max-h-[750px] overflow-y-auto pr-2 no-scrollbar">
                                ${listHtml}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;

        if(editId) {
            const v = vehicles.find(x => x.id === editId);
            setTimeout(() => {
                document.getElementById('vName').value = v.name;
                document.getElementById('vCat').value = v.category;
                document.getElementById('vPrice').value = v.price;
                document.getElementById('vLoc').value = v.location;
                document.getElementById('vDesc').value = v.description;
                document.getElementById('vVIP').checked = v.isVIP;
            }, 50);
        }
    }

    // --- UYGULAMA İŞLEVLERİ ---
    window.handleLogin = function(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;
        if (email === 'admin@admin.com' && pass === '123456') {
            currentUser = { email };
            window.location.hash = '#/admin';
        } else {
            const err = document.getElementById('loginError');
            err.innerText = 'Hatalı giriş! E-posta: admin@admin.com Şifre: 123456';
            err.style.display = 'block';
        }
    };

    window.handleLogout = function() {
        currentUser = null;
        window.location.hash = '';
    };

    window.handleFile = function(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onloadend = () => {
                uploadedImg = reader.result;
                renderAdminPanel(); 
            }
            reader.readAsDataURL(file);
        }
    };

    window.saveVehicle = function(e) {
        e.preventDefault();
        const name = document.getElementById('vName').value;
        const cat = document.getElementById('vCat').value;
        const price = document.getElementById('vPrice').value;
        const loc = document.getElementById('vLoc').value;
        const desc = document.getElementById('vDesc').value;
        const vip = document.getElementById('vVIP').checked;
        
        const btn = document.getElementById('saveBtn');
        btn.innerText = "KAYDEDİLİYOR...";
        btn.disabled = true;

        setTimeout(() => {
            let img = uploadedImg;
            if (editId) {
                const existing = vehicles.find(x => x.id === editId);
                if (!img) img = existing.image;
                vehicles = vehicles.map(v => v.id === editId ? {id: v.id, name, category: cat, price, location: loc, image: img, description: desc, isVIP: vip, date: 'Bugün'} : v);
            } else {
                if (!img) { 
                    alert('Lütfen fotoğraf yükleyin!'); 
                    btn.innerText="İLAN KAYDET"; 
                    btn.disabled=false; 
                    return; 
                }
                let newId = Math.floor(1000 + Math.random() * 9000);
                vehicles.push({ id: newId, name, category: cat, price, location: loc, image: img, description: desc, isVIP: vip, date: 'Bugün' });
            }
            
            editId = null;
            uploadedImg = '';
            alert('Demo ilan başarıyla kaydedildi!');
            renderAdminPanel();
        }, 500);
    };

    window.deleteVehicle = function(id) {
        if (confirm('Bu ilanı silmek istediğinize emin misiniz?')) {
            vehicles = vehicles.filter(v => v.id !== id);
            renderAdminPanel();
        }
    };

    window.editVehicle = function(id) {
        const v = vehicles.find(x => x.id === id);
        editId = v.id;
        uploadedImg = v.image;
        renderAdminPanel();
    };

    // SİSTEMİ BAŞLAT
    window.addEventListener('hashchange', route);
    window.onload = route;

</script>
</body>
</html>
